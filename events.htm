<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="event.js" type="text/javascript"></script>
    <title>Document</title>
    <style>
.btn {
  background-color: rgb(244, 31, 7);
  color: white;
  padding: 10px 20px;
  border: none;
}

.btn:hover {
  background-color: rgb(6, 237, 25);
}
</style>
</head>
<body>

    <button  class="btn">Mouse over </button>
    <button  onmouseover="green()" id="mo">mouse over </button>
    <button  onmouseout="blue()" id="mout">mouse out </button>

    <button onmouseover="green()" onmouseout="blue()">mouse in and out</button>

    
    
</body>
</html>
