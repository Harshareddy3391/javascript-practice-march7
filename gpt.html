<!DOCTYPE html>
<html>
<head>
    <title>Input Events Demo</title>
    <script src="./gpt.js" type="text/javascript"></script>
</head>
<body>
    <h2>Input Box Events Example</h2>
    
    <form>
        <!-- Input Box 1: Changes color on focus -->
        <label>Input Box 1 (Focus turns yellow):</label><br>
        <input 
            type="text" 
            id="input1" 
            placeholder="Click here to focus"
        ><br><br>

        <!-- Input Box 2: Converts to uppercase on blur -->
        <label>Input Box 2 (Blur converts to uppercase):</label><br>
        <input 
            type="text" 
            id="input2" 
            placeholder="Type and click outside"
        ><br><br>

        <input type="submit" value="Submit">
    </form>

    <!-- Link to external JavaScript file -->
    <script src="script.js"></script>
</body>
</html>
